name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY_B64: ''
    outputs:
      service_url: ${{ steps.tf_out.outputs.service_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP
        run: |
          echo '${{ env.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project '${{ env.GCP_PROJECT_ID }}'
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Ensure GCS state bucket exists
        run: |
          BUCKET="${{ env.GCP_PROJECT_ID }}-agentflow-tf-state"
          gsutil ls gs://$BUCKET 2>/dev/null || \
          gsutil mb -p ${{ env.GCP_PROJECT_ID }} gs://$BUCKET

      - name: Ensure Artifact Registry repository exists
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          gcloud artifacts repositories describe agentflow \
            --location=$REGION --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create agentflow \
            --repository-format=docker \
            --location=$REGION \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="AgentFlow generated application images"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ env.GCP_PROJECT_ID }}-agentflow-tf-state" \
            -backend-config="prefix=rentacar-4b83b570"

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GCP_REGION || 'us-central1' }}" \
            -var="service_name=rentacar-4b83b570" \
            -var="image=${{ env.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/rentacar-4b83b570:${{ github.sha }}"

      - name: Capture service URL
        id: tf_out
        working-directory: infra/terraform
        run: echo "service_url=$(terraform output -raw service_url)" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: provision
    env:
      GCP_PROJECT_ID: 'agentflow-496320'
      GCP_REGION: 'us-central1'
      GCP_SA_KEY_B64: ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate with GCP
        run: |
          echo '${{ env.GCP_SA_KEY_B64 }}' | base64 -d > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project '${{ env.GCP_PROJECT_ID }}'
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV
          gcloud auth configure-docker '${{ env.GCP_REGION || 'us-central1' }}-docker.pkg.dev' --quiet

      - name: Build & push image
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          IMAGE="$REGION-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/rentacar-4b83b570"
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          REGION="${{ env.GCP_REGION || 'us-central1' }}"
          IMAGE="$REGION-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/agentflow/rentacar-4b83b570:${{ github.sha }}"
          gcloud run deploy rentacar-4b83b570 \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet

      - name: Print service URL
        run: echo "Deployed to ${{ needs.provision.outputs.service_url }}"
